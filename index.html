<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>PSCG Smart Quote - Nuvem</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 20px; color: #333; }
        h1, h2, h3 { background: #dc3545; color: #fff; padding: 15px; border-radius: 6px; margin-top: 0; }
        .box { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e1e4e8; }
        .tab-container { display: flex; gap: 4px; margin-bottom: -1px; }
        .tab { padding: 12px 25px; cursor: pointer; background: #cbd3da; border-radius: 8px 8px 0 0; font-weight: bold; border: none; }
        .tab.active { background: #dc3545; color: white; }
        .tab-content { display: none; border-top: 5px solid #dc3545; padding: 20px; background: #fff; }
        .tab-content.active { display: block; }
        button { background: #dc3545; color: #fff; border: none; cursor: pointer; padding: 12px; border-radius: 5px; width: 100%; font-weight: bold; margin-bottom: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: center; }
        th { background: #f8f9fa; }
        .cloud-badge { float: right; font-size: 12px; background: #28a745; color: white; padding: 4px 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="cloud-badge">● NUVEM ATIVA (EQUIPE)</div>
<h1>📦 PSCG Smart Quote</h1>

<div class="tab-container">
    <button class="tab active" onclick="openTab('cotacao')">📊 1. COTAÇÃO</button>
    <button class="tab" onclick="openTab('aprovacao')">⚖️ 2. APROVAÇÃO</button>
    <button class="tab" onclick="openTab('gestao')">⚙️ 3. GESTÃO</button>
</div>

<div id="cotacao" class="tab-content active">
    <div class="box">
        <h3>Lançar Item</h3>
        <input type="text" id="prodNome" placeholder="Nome do Produto" style="width: 100%; padding: 10px; margin-bottom: 10px;">
        <div id="inputsPrecos"></div>
        <button onclick="salvarNoFirebase()" style="background: #333; margin-top: 10px;">ADICIONAR ITEM AO MAPA</button>
    </div>
    <div class="box">
        <div id="tabelaMapa"></div>
        <button onclick="limparMapa()" style="background: #6c757d; width: auto; margin-top: 10px;">Limpar Mapa</button>
    </div>
</div>

<div id="aprovacao" class="tab-content">
    <div class="box"><h3>Aprovações Pendentes</h3><div id="telaAprovacao"></div></div>
</div>

<div id="gestao" class="tab-content">
    <div class="box">
        <h3>Cadastrar Fornecedor</h3>
        <input type="text" id="fornNome" placeholder="Nome do Fornecedor" style="width: 70%; padding: 10px;">
        <button onclick="addFornecedor()" style="width: 25%;">ADICIONAR</button>
        <div id="listaForn" style="margin-top: 20px;"></div>
    </div>
</div>

<script>
// CONFIGURAÇÃO DO SEU FIREBASE (ATUALIZADA)
const firebaseConfig = {
  apiKey: "AIzaSyA5R0cSqndwuNsigkHipKWnkIrZ8XnSTlI",
  authDomain: "pscg-smart-quote-51d94.firebaseapp.com",
  projectId: "pscg-smart-quote-51d94",
  databaseURL: "https://pscg-smart-quote-51d94-default-rtdb.firebaseio.com",
  storageBucket: "pscg-smart-quote-51d94.firebasestorage.app",
  messagingSenderId: "1016561499081",
  appId: "1:1016561499081:web:6b39395dde1ba0165f8618"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let fornecedores = [];
let mapaItens = [];

// Sincronizar Fornecedores
db.ref('fornecedores').on('value', (snap) => {
    fornecedores = snap.val() || [];
    renderizarGestao();
    renderizarInputs();
});

// Sincronizar Mapa de Cotação
db.ref('mapa_atual').on('value', (snap) => {
    mapaItens = snap.val() || [];
    renderizarTabela();
});

function openTab(id) {
    document.querySelectorAll('.tab-content, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

function addFornecedor() {
    const n = document.getElementById('fornNome').value.toUpperCase();
    if(n && !fornecedores.includes(n)) {
        fornecedores.push(n);
        db.ref('fornecedores').set(fornecedores);
        document.getElementById('fornNome').value = '';
    }
}

function renderizarGestao() {
    document.getElementById('listaForn').innerHTML = "<strong>Fornecedores na Nuvem:</strong><br>" + fornecedores.join(" | ");
}

function renderizarInputs() {
    const div = document.getElementById('inputsPrecos');
    div.innerHTML = fornecedores.map((f, i) => `
        <label>${f}:</label> <input type="number" id="p_${i}" step="0.01" value="0.00" style="margin-right:10px; padding:5px; width:80px;">
    `).join("");
}

function salvarNoFirebase() {
    const nome = document.getElementById('prodNome').value;
    if(!nome) return alert("Insira o nome do produto");
    let precos = fornecedores.map((_, i) => parseFloat(document.getElementById(`p_${i}`).value) || 0);
    mapaItens.push({ produto: nome, valores: precos });
    db.ref('mapa_atual').set(mapaItens);
    document.getElementById('prodNome').value = '';
}

function renderizarTabela() {
    const div = document.getElementById('tabelaMapa');
    if(!mapaItens.length) { div.innerHTML = "Mapa vazio."; return; }
    let h = `<table><thead><tr><th>Produto</th>` + fornecedores.map(f => `<th>${f}</th>`).join("") + `</tr></thead><tbody>`;
    mapaItens.forEach(it => {
        h += `<tr><td>${it.produto}</td>` + it.valores.map(v => `<td>R$ ${v.toFixed(2)}</td>`).join("") + `</tr>`;
    });
    div.innerHTML = h + `</tbody></table>`;
}

function limparMapa() {
    if(confirm("Deseja apagar o mapa para TODOS da equipe?")) db.ref('mapa_atual').remove();
}
</script>
</body>
</html>
