<script>
// Variáveis Globais e Persistência
// 1. CONFIGURAÇÃO ATUALIZADA DO SEU FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAZGL3_8gaYpdTvOfSpxp3IMtCQ4JxVg6Q",
  authDomain: "pscg-smart-quote.firebaseapp.com",
  projectId: "pscg-smart-quote",
  databaseURL: "https://pscg-smart-quote-default-rtdb.firebaseio.com", // Verifique se o link do seu Database é este
  storageBucket: "pscg-smart-quote.firebasestorage.app",
  messagingSenderId: "1019995873552",
  appId: "1:1019995873552:web:569324754ac3ed9a7b8595"
};

// Inicialização
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();

// Variáveis Globais
let fornecedores = [];
let itens = [];
let bancoFornecedores = [];
let produtosImportados = {};
let historico = [];
let itensEmAprovacao = [];

// 2. OUVINTE DE DADOS (ESSENCIAL PARA NÃO APAGAR AO ATUALIZAR)
// Esta função "puxa" os dados da nuvem assim que você abre o site
db.ref().on('value', (snapshot) => {
    const data = snapshot.val() || {};
    
    // Sincroniza as variáveis locais com o banco de dados
    fornecedores = data.pscg_fornecedores || [];
    itens = data.pscg_itens || [];
    historico = data.pscg_historico || [];
    itensEmAprovacao = data.pscg_aprovacao || [];
    produtosImportados = data.pscg_importados || {};
    bancoFornecedores = data.pscg_banco_forn || [];

    console.log("Dados carregados com sucesso!");

    // Atualiza a tela automaticamente
    if (typeof atualizarInterface === "function") atualizarInterface();
    if (typeof renderizarTabelas === "function") renderizarTabelas();
    if (typeof renderizarGestao === "function") renderizarGestao();
});

// 3. FUNÇÃO DE SALVAMENTO (UNIFICADA)
function salvarNoNavegador() {
    console.log("Tentando salvar...", {fornecedores, itens}); // Log para teste
    
    db.ref().update({
        'pscg_fornecedores': fornecedores,
        'pscg_itens': itens,
        'pscg_historico': historico,
        'pscg_aprovacao': itensEmAprovacao,
        'pscg_importados': produtosImportados,
        'pscg_banco_forn': bancoFornecedores
    })
    .then(() => {
        console.log("✅ Sucesso: Dados gravados no Firebase!");
    })
    .catch((error) => {
        console.error("❌ Erro detalhado do Firebase:", error);
        alert("Erro ao salvar: " + error.message);
    });
}function importarExcel() {
    const file = document.getElementById("importExcel").files[0];
    if (!file) {
        alert("Por favor, selecione um arquivo Excel primeiro.");
        return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            
            let novosProdutos = {}; 
            
          rows.forEach(r => {
    		let nome = String(r.Produto || r.Item || r.PRODUTO || "").trim();
   	 // Garante que a quantidade seja um número
    		const qtd = parseFloat(r.Quantidade || r.Qtd || r.QTD || r.Reserva || 1);
    
   		 if (nome) {
        		const nomeLimpo = nome.replace(/[\.\#\$\/\[\]]/g, " - ");
        		novosProdutos[nomeLimpo] = qtd; // Aqui guardamos o NOME e a QUANTIDADE
    }
});

            // SALVA NO FIREBASE
            db.ref('pscg_importados').set(novosProdutos)
                .then(() => {
                    produtosImportados = novosProdutos;
                    atualizarInterface();
                    alert("✅ Importado com sucesso! Caracteres especiais foram corrigidos.");
                })
                .catch((error) => {
                    console.error("Erro Firebase:", error);
                    alert("Erro ao salvar: " + error.message);
                });

        } catch (err) {
            alert("Erro ao processar: " + err.message);
        }
    };
    reader.readAsArrayBuffer(file);
}
// 4. CADASTRO DE FORNECEDOR (CORRIGIDO)
function salvarNovoFornecedorBase() {
    const input = document.getElementById("cadFornecedorNome");
    const nome = input.value.trim().toUpperCase();
    
    if (!nome) return alert("Digite o nome do fornecedor!");
    if (bancoFornecedores.includes(nome)) return alert("Fornecedor já cadastrado!");
    
    bancoFornecedores.push(nome);
    input.value = "";
    salvarNoNavegador(); // Envia para o Firebase
}


// 6. ATUALIZAÇÃO DOS MENUS (SELECTS)
function atualizarInterface() {
    const selProd = document.getElementById("produtoSelect");
    if (selProd) {
        const atual = selProd.value;
        selProd.innerHTML = '<option value="">Selecione um produto...</option>';
        Object.keys(produtosImportados).forEach(p => {
            selProd.innerHTML += `<option value="${p}">${p}</option>`;
        });
        selProd.value = atual;
    }

    const selForn = document.getElementById("fornecedorSelectBase");
    if (selForn) {
        selForn.innerHTML = '<option value="">Selecione da base...</option>';
        bancoFornecedores.forEach(f => {
            selForn.innerHTML += `<option value="${f}">${f}</option>`;
// Adicione este "ouvinte" para detectar quando o usuário escolhe um produto
document.getElementById("produtoSelect").addEventListener("change", function() {
    const produtoSelecionado = this.value;
    const campoQuantidade = document.getElementById("quantidade");

    if (produtoSelecionado && produtosImportados[produtoSelecionado]) {
        // Puxa a quantidade da planilha que está guardada em produtosImportados
        campoQuantidade.value = produtosImportados[produtoSelecionado];
    } else {
        campoQuantidade.value = 1; // Valor padrão caso não encontre
    }
});
        });
    }
}

// ... mantenha suas funções de renderizarTabelas, excluirItem, etc, abaixo daqui.

// --- GESTÃO DE INTERFACE E ABA 1 ---
function excluirFornecedorDaCotacao(idx) {
    if (!confirm(`Deseja remover o fornecedor "${fornecedores[idx]}" desta cotação?`)) return;

    // Remove o nome do fornecedor do array
    fornecedores.splice(idx, 1);

    // Remove os valores correspondentes a esse fornecedor em cada item já salvo
    itens.forEach(item => {
        item.valores.splice(idx, 1);
    });

    salvarNoNavegador();
    atualizarInterface();
    renderizarTabelas();
}
function atualizarInterface() {
    // 1. Inputs de Preços na Aba 1
    const containerPrecos = document.getElementById("inputsPrecos");
    if(containerPrecos) {
        containerPrecos.innerHTML = fornecedores.map((f, i) => 
            `<div><label>${f}</label><input id="v${i}" type="number" step="0.01"></div>`
        ).join("");
    }

    // 2. Select de Produtos (Importados do Excel)
    const nomesProds = Object.keys(produtosImportados);
    let optProds = '<option value="">PRODUTO...</option>';
    nomesProds.forEach(n => optProds += `<option value="${n}">${n}</option>`);
    document.getElementById("produtoSelect").innerHTML = optProds;

    // 3. Select de Fornecedores Cadastrados (Banco de Dados)
    const selectForn = document.getElementById("fornecedorSelectBase");
    if(selectForn) {
        let optForn = '<option value="">Selecione um Fornecedor Cadastrado...</option>';
        bancoFornecedores.forEach(f => optForn += `<option value="${f}">${f}</option>`);
        selectForn.innerHTML = optForn;
    }
}

function vincularQuantidade(produtoNome) {
    if (produtosImportados[produtoNome]) {
        document.getElementById("quantidade").value = produtosImportados[produtoNome];
    }
}

function adicionarFornecedorNaCotacao() {
    const nome = document.getElementById("fornecedorSelectBase").value;
    if (!nome) return alert("Selecione um fornecedor da lista!");
    if (fornecedores.includes(nome)) return alert("Este fornecedor já está na cotação!");
    
    fornecedores.push(nome);
    salvarNoNavegador();
    atualizarInterface();
    renderizarTabelas();
}

// --- GESTÃO PERMANENTE DE FORNECEDORES (ABA 4) ---

function salvarNovoFornecedorBase() {
    const nome = document.getElementById("cadFornecedorNome").value.trim().toUpperCase();
    if (!nome) return alert("Digite um nome!");
    if (bancoFornecedores.includes(nome)) return alert("Fornecedor já cadastrado!");
    
    bancoFornecedores.push(nome);
    bancoFornecedores.sort();
    salvarNoNavegador();
    document.getElementById("cadFornecedorNome").value = "";
    renderizarGestao();
    atualizarInterface();
}

function renderizarGestao() {
    const corpo = document.getElementById("listaFornecedoresBase");
    if(!corpo) return;
    corpo.innerHTML = bancoFornecedores.map((f, i) => `
        <tr>
            <td style="text-align: left; padding-left: 20px;">${f}</td>
            <td>
                <button class="btn-blue" style="width:auto; padding: 5px 10px; margin-right: 5px;" onclick="editarFornecedorBase(${i})">Editar</button>
                <button class="btn-red" style="width:auto; padding: 5px 10px" onclick="excluirFornecedorBase(${i})">Excluir</button>
            </td>
        </tr>
    `).join("");
}
function editarFornecedorBase(idx) {
    const nomeAntigo = bancoFornecedores[idx];
    const novoNome = prompt(`Editar nome do fornecedor:`, nomeAntigo);

    if (novoNome === null) return; // Usuário cancelou
    
    const nomeFormatado = novoNome.trim().toUpperCase();

    if (!nomeFormatado) {
        alert("O nome não pode estar vazio!");
        return;
    }

    if (bancoFornecedores.includes(nomeFormatado) && nomeFormatado !== nomeAntigo) {
        alert("Já existe um fornecedor com este nome!");
        return;
    }

    // 1. Atualiza no Banco de Fornecedores (Cadastro Permanente)
    bancoFornecedores[idx] = nomeFormatado;

    // 2. Atualiza nas cotações em andamento (Aba 1), se o nome antigo estiver lá
    const indexNaCotacao = fornecedores.indexOf(nomeAntigo);
    if (indexNaCotacao !== -1) {
        fornecedores[indexNaCotacao] = nomeFormatado;
    }

    // 3. Atualiza nos lotes em aprovação, se necessário
    itensEmAprovacao.forEach(lote => {
        const idxLote = lote.fornecedoresLote.indexOf(nomeAntigo);
        if (idxLote !== -1) {
            lote.fornecedoresLote[idxLote] = nomeFormatado;
        }
    });

    salvarNoNavegador();
    renderizarGestao();
    atualizarInterface();
    renderizarTabelas();
    alert("✅ Fornecedor atualizado com sucesso!");
}
function excluirFornecedorBase(idx) {
    if(!confirm("Remover do cadastro permanente?")) return;
    bancoFornecedores.splice(idx, 1);
    salvarNoNavegador();
    renderizarGestao();
    atualizarInterface();
}

// --- LÓGICA DE COTAÇÃO E ITENS ---

function salvarItem() {
    const p = document.getElementById("produtoSelect").value.trim();
    const qtd = parseFloat(document.getElementById("quantidade").value) || 0;
    const editIdx = parseInt(document.getElementById("editIndex").value);

    if (!p || qtd <= 0) {
        alert("Selecione um produto e uma quantidade válida!");
        return;
    }

    // Pega os preços dos inputs v0, v1, v2...
    const valores = fornecedores.map((_, i) => {
        const campo = document.getElementById(`v${i}`);
        return campo ? (parseFloat(campo.value) || 0) : 0;
    });

    if (editIdx > -1) {
        itens[editIdx] = { p, qtd, valores };
    } else {
        itens.push({ p, qtd, valores });
    }

    // Tenta salvar no Firebase
    db.ref('pscg_itens').set(itens)
        .then(() => {
            alert("✅ Item salvo com sucesso na nuvem!");
            limparCampos();
            renderizarTabelas();
        })
        .catch((error) => {
            console.error("Erro real:", error);
            alert("Erro ao gravar: " + error.message);
        });
}function liberarParaAprovacao() {
    const cc = document.getElementById("centroCusto").value;
    const conta = document.getElementById("contaContabil").value;
    if(!cc || !conta || itens.length === 0) return alert("Preencha CC, Conta e adicione itens!");
    
    itensEmAprovacao.push({
        id: Date.now(),
        dataEnvio: new Date().toLocaleString(),
        centroCusto: cc,
        contaContabil: conta,
        fornecedoresLote: [...fornecedores], 
        produtos: JSON.parse(JSON.stringify(itens))
    });
    
    itens = []; fornecedores = [];
    salvarNoNavegador();
    atualizarInterface();
    alert("🚀 Enviado para Aprovação!");
    openTab('aprovacao');
}

// --- FUNÇÕES DE EDIÇÃO NA ABA DE APROVAÇÃO (CORREÇÃO) ---

function editarNoLote(loteIdx, prodIdx, tipo, fornIdx, novoValor) {
    // 1. Converte e valida o valor de entrada
    const val = parseFloat(novoValor) || 0;
    
    // 2. Localiza o lote específico na memória local
    const lote = itensEmAprovacao[loteIdx];
    if (!lote) return;

    // 3. Aplica a alteração conforme o tipo (Quantidade ou Valor Unitário)
    if (tipo === 'qtd') {
        lote.produtos[prodIdx].qtd = val;
    } else if (tipo === 'valor') {
        // Garante que o array de valores exista para evitar erros de undefined
        if (!lote.produtos[prodIdx].valores) {
            lote.produtos[prodIdx].valores = [];
        }
        lote.produtos[prodIdx].valores[fornIdx] = val;
    }

    // 4. Atualização Inteligente no Firebase
    // Em vez de salvar TUDO, salvamos apenas o array de itens em aprovação
    db.ref('pscg_aprovacao').set(itensEmAprovacao)
        .then(() => {
            console.log(`✅ Lote ${loteIdx + 1} atualizado com sucesso.`);
            
            // 5. Re-renderiza as tabelas para atualizar os cálculos de Total e Economia
            // O uso de 'onblur' nos inputs (mencionado anteriormente) impedirá 
            // que a tabela "suma" enquanto você digita.
            renderizarTabelas();
        })
        .catch((error) => {
            console.error("❌ Erro ao atualizar lote:", error);
        });
}

function excluirFornecedorDoLote(loteIdx, fornIdx) {
    if(!confirm("Remover este fornecedor deste mapa específico?")) return;
    itensEmAprovacao[loteIdx].fornecedoresLote.splice(fornIdx, 1);
    itensEmAprovacao[loteIdx].produtos.forEach(p => p.valores.splice(fornIdx, 1));
    salvarNoNavegador();
    renderizarTabelas();
}

function retornarParaCotacao(loteIdx) {
    if (!confirm("Deseja retornar este lote para edição na aba 1?")) return;
    const lote = itensEmAprovacao[loteIdx];
    fornecedores = [...lote.fornecedoresLote];
    itens = JSON.parse(JSON.stringify(lote.produtos));
    document.getElementById("centroCusto").value = lote.centroCusto;
    document.getElementById("contaContabil").value = lote.contaContabil;
    itensEmAprovacao.splice(loteIdx, 1);
    salvarNoNavegador();
    atualizarInterface();
    openTab('cotacao');
}

function renderizarTabelas() {

    const containerCotacao = document.getElementById('tabCotacaoWrapper');
    if (containerCotacao) {
        if (!fornecedores.length || !itens.length) {
            containerCotacao.innerHTML = "<p class='lock-msg'>Vazio. Adicione fornecedores e produtos para visualizar o mapa.</p>";
        } else {
            let html = `<table><thead><tr><th rowspan="2">PRODUTO</th><th rowspan="2">QTD</th>`;
            fornecedores.forEach((f, i) => {
                html += `<th colspan="2">${f} <button class="btn-del-cotacao" onclick="excluirFornecedorDaCotacao(${i})">X</button></th>`;
            });
            html += `<th rowspan="2" style="width:100px">AÇÕES</th></tr><tr>`;
            fornecedores.forEach(() => html += `<th>UNIT.</th><th>TOTAL</th>`);
            html += `</tr></thead><tbody>`;

            itens.forEach((it, idx) => {
                // Segurança: Garante que valores seja um array
                const listaValores = Array.isArray(it.valores) ? it.valores : [];

                html += `<tr><td style="text-align:left">${it.p}</td><td>${it.qtd}</td>`;
                
                fornecedores.forEach((_, fIdx) => {
                    const v = listaValores[fIdx] || 0;
                    const sub = v * it.qtd;

                    html += `
                        <td class="${cls}">R$ ${v.toFixed(2)}</td>

                html += `<td style="display:flex; gap:5px; justify-content:center; border:none">

        }

        itensEmAprovacao.forEach((lote, loteIdx) => {

                    <span style="font-size:12px; color:#666">${lote.dataEnvio}</span>
                </div>
                <table><thead><tr><th rowspan="2">PRODUTO</th><th rowspan="2">QTD</th>`;
            
            lote.fornecedoresLote.forEach((f, fIdx) => {
                loteHtml += `<th colspan="2">${f} <button class="btn-del-forn" onclick="excluirFornecedorDoLote(${loteIdx}, ${fIdx})">X</button></th>`;

            loteHtml += `</tr></thead><tbody>`;
            
            let fornecedorCompleto = Array(lote.fornecedoresLote.length).fill(true);
            let totaisForn = Array(lote.fornecedoresLote.length).fill(0);

            lote.produtos.forEach((it, pIdx) => {
                const listaValoresLote = Array.isArray(it.valores) ? it.valores : [];
                const precosValidosLote = listaValoresLote.filter(v => typeof v === 'number' && v > 0);
                const min = precosValidosLote.length > 0 ? Math.min(...precosValidosLote) : null;

                loteHtml += `<tr><td style="text-align:left">${it.p}</td>
                    <td><input type="number" value="${it.qtd}" style="width:50px" onchange="editarNoLote(${loteIdx},${pIdx},'qtd',-1,this.value)"></td>`;
                
                lote.fornecedoresLote.forEach((fNome, fIdx) => {
                    const v = listaValoresLote[fIdx] || 0;
                    const sub = v * it.qtd; 
                    totaisForn[fIdx] += sub;
                    
                    if (v <= 0) fornecedorCompleto[fIdx] = false;

                    const eOMelhor = (min !== null && v === min && v > 0);
                    const cls = eOMelhor ? 'melhor' : '';

                    // Acumula para o resumo individual por fornecedor
                    if (eOMelhor) {
                        resumoFornLote[fNome] += sub;
                    }

                    loteHtml += `
                        <td class="${cls}"><input type="number" value="${v.toFixed(2)}" style="width:80px" onchange="editarNoLote(${loteIdx},${pIdx},'valor',${fIdx},this.value)"></td>

                loteHtml += `</tr>`;

            loteHtml += `</tbody><tfoot style="background:#eee; font-weight:bold"><tr><td colspan="2" style="text-align:right">TOTAL FECHADO:</td>`;

            loteHtml += `<div style="margin-top:20px; padding:15px; background:#f0f7ff; border:1px solid #007bff; border-radius:8px;">
                            <h5 style="margin-top:0; color:#0056b3;">🏆 COMPRA FRACIONADA (MENOR PREÇO POR ITEM)</h5>
                            <div style="display: flex; flex-wrap: wrap; gap: 10px;">`;
            
            lote.fornecedoresLote.forEach(f => {
                const totalF = resumoFornLote[f];
    if(totalF > 0) {
        loteHtml += `
            <div style="flex:1; min-width:220px; padding:10px; background:#fff; border-radius:5px; border-left:4px solid #28a745; box-shadow: 2px 2px 5px rgba(0,0,0,0.05)">
                <div style="font-size:11px; font-weight:bold; color:#1a2a3a">${f}</div>
                <div style="font-size:14px; color:#28a745; font-weight:bold">Total Menor Preço: R$ ${totalF.toFixed(2)}</div>
                <button class="btn-blue" 
                        style="width:100%; margin-top:8px; font-size:10px; padding:5px; background:#28a745" 
                        onclick="aprovarPorFornecedor(${loteIdx}, '${f}')">
                    ✔ APROVAR ESTES ITENS
                </button>
            </div>`;
                }
            });
            loteHtml += `</div></div>`;

            // (O restante da lógica de vencedor, botões Aprovar/Reprovar continua aqui...)
            const valsValidos = totaisForn.filter((t, idx) => t > 0 && fornecedorCompleto[idx]);
            const menor = valsValidos.length > 0 ? Math.min(...valsValidos) : 0;
            const idxV = totaisForn.indexOf(menor);
            const temVencedorReal = valsValidos.length > 0;
            const maior = Math.max(...totaisForn);
            const econ = (maior > menor && menor > 0) ? ((maior - menor) / maior) * 100 : 0;

            loteHtml += `
            <div style="margin-top:20px; padding:15px; background:#fff; border:1px solid #ddd; border-radius:5px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                    <div>
                        <div style="font-size:16px">🏆 Vencedor (Lote Inteiro): <strong style="color:${temVencedorReal ? '#28a745' : '#dc3545'}">
                            ${temVencedorReal ? lote.fornecedoresLote[idxV] : "AGUARDANDO PREÇOS"}
                        </strong></div>
                        <div style="font-size:18px">💰 Valor Vencedor: <strong>R$ ${menor.toFixed(2)}</strong></div>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button class="btn-orange" style="width:auto; padding:8px" onclick="gerarPDFMapaLote(${loteIdx})">📄 PDF MAPA</button>
                        <button class="btn-purple" style="width:auto; padding:8px" onclick="gerarPDFListaPedido(${loteIdx})">📄 LISTA PEDIDO</button>
                    </div>
                </div>
                <div style="display:flex; gap:10px; border-top:1px solid #eee; padding-top:10px">
                    <button class="btn-dark" style="background:#6c757d; width:auto" onclick="retornarParaCotacao(${loteIdx})">↩ EDITAR</button>
                    <button class="btn-red" style="width:auto; background:#dc3545" onclick="decidirLote(${loteIdx},'REPROVADO')">✖ REPROVAR</button>
                    <button class="btn-blue" style="width:auto; background:#007bff" onclick="${temVencedorReal ? `decidirLote(${loteIdx},'APROVADO')` : `alert('Não é possível aprovar!')`}">✔ APROVAR</button>

        });

    // --- RENDERIZAÇÃO DA ABA 3 (HISTÓRICO) ---
    const containerHist = document.getElementById('tabHistoricoWrapper');
    if (containerHist) {
        containerHist.innerHTML = "";
        if (!historico || historico.length === 0) {
            containerHist.innerHTML = "<p style='text-align:center; padding:20px;'>Nenhum registro no histórico.</p>";
        } else {
            [...historico].reverse().forEach((lote, hIdxOriginal) => {
                const hIdx = historico.length - 1 - hIdxOriginal;
                const corStatus = lote.status === 'APROVADO' ? '#28a745' : '#dc3545';
                
                let histHtml = `
                <div class="box" style="border-left: 8px solid ${corStatus}; margin-bottom: 15px;">
                    <div style="display:flex; justify-content:space-between; align-items:center">

                        <button class="btn-dark" style="width:auto; padding:5px 10px; font-size:12px;" onclick="gerarPDFHist(${hIdx})">📄 PDF</button>

                        <button class="btn-red" style="width:auto; padding:5px 10px; font-size:12px;" onclick="if(confirm('Excluir permanentemente?')){ historico.splice(${hIdx},1); salvarNoNavegador(); renderizarTabelas(); }">🗑️ EXCLUIR</button>

}
function excluirItem(index) {
    if (confirm("Tem certeza que deseja excluir este item da cotação?")) {
        itens.splice(index, 1);
        salvarNoNavegador();
        renderizarTabelas();
        limparCampos();
    }
}
function aprovarPorFornecedor(loteIdx, fornecedorNome) {
    const lote = itensEmAprovacao[loteIdx];
    const fIdx = lote.fornecedoresLote.indexOf(fornecedorNome);
    
    if (fIdx === -1) return;

    let itensParaAprovar = [];
    let itensRestantes = [];

    // 1. Separa os itens que o fornecedor venceu (menor preço)
    lote.produtos.forEach((it) => {
        const precosValidos = it.valores.filter(v => typeof v === 'number' && v > 0);
        const min = precosValidos.length > 0 ? Math.min(...precosValidos) : null;
        const valorDesteForn = it.valores[fIdx];

        if (min !== null && valorDesteForn === min && valorDesteForn > 0) {
            itensParaAprovar.push(it);
        } else {
            itensRestantes.push(it);
        }
    });

    if (itensParaAprovar.length === 0) {
        alert("Este fornecedor não possui itens com menor preço neste lote.");
        return;
    }

    const confirmacao = confirm(`Deseja aprovar os ${itensParaAprovar.length} itens ganhos por ${fornecedorNome}?`);

    if (confirmacao) {
        // Calcular o total dessa aprovação fracionada
        let totalAprovado = 0;
        itensParaAprovar.forEach(it => {
            totalAprovado += (it.valores[fIdx] * it.qtd);
        });

        // 2. PREPARAR O OBJETO PARA O HISTÓRICO (Usando o padrão que seu sistema já lê)
        const novoRegistroHistorico = {
            data: lote.dataEnvio,
            dataDecisao: new Date().toLocaleString('pt-BR'),
            cc: lote.centroCusto,
            conta: lote.contaContabil,
            vence: fornecedorNome,
            total: `R$ ${totalAprovado.toFixed(2)}`,
            status: "APROVADO (FRACIONADO)",
            itens: itensParaAprovar,
            vIdx: 0, // Como filtramos apenas os itens dele, ele é o "índice 0" desses itens
            numeroPedido: "FRACIONADO",
            fornecedoresOriginais: [fornecedorNome]
        };

        // 3. SALVAR NO CAMINHO CORRETO (pscg_historico)
        if (!historico) historico = [];
        historico.push(novoRegistroHistorico);

        // 4. ATUALIZAR O LOTE NO FIREBASE (pscg_aprovacao)
        if (itensRestantes.length === 0) {
            itensEmAprovacao.splice(loteIdx, 1);
        } else {
            itensEmAprovacao[loteIdx].produtos = itensRestantes;
        }

        // Salva tudo de uma vez no padrão do seu banco
        db.ref().update({
            'pscg_historico': historico,
            'pscg_aprovacao': itensEmAprovacao
        }).then(() => {
            alert("Sucesso! Itens movidos para o histórico.");
            renderizarTabelas();
        }).catch(e => alert("Erro ao salvar: " + e.message));
    }
}
function decidirLote(idx, status) {
    const lote = itensEmAprovacao[idx];
    if (!lote) return;

    let numeroPedido = "";
    if (status === 'APROVADO') {
        numeroPedido = prompt("Insira o NÚMERO DO PEDIDO:");
        if (numeroPedido === null) return;
    }

    // Cálculos de valores...
    let totais = Array(lote.fornecedoresLote.length).fill(0);
    lote.produtos.forEach(it => {
        (it.valores || []).forEach((v, j) => {
            totais[j] += (v * (it.qtd || 0));
        });
    });
    
    const valsValidos = totais.filter(t => t > 0);
    const menor = valsValidos.length > 0 ? Math.min(...valsValidos) : 0;
    const idxV = totais.indexOf(menor);

    if (!historico) historico = [];

    // SALVANDO NO HISTÓRICO (Garantindo a Conta Contábil)
    historico.push({
        data: lote.dataEnvio, 
        cc: lote.centroCusto, 
        conta: lote.contaContabil, // <-- IMPORTANTE: Verifique se este nome bate com o do lote
        vence: idxV !== -1 ? lote.fornecedoresLote[idxV] : "N/D",
        total: `R$ ${menor.toFixed(2)}`, 
        status: status, 
        itens: lote.produtos, 
        vIdx: idxV, 
        numeroPedido: numeroPedido || "N/D", 
        fornecedoresOriginais: [...lote.fornecedoresLote],
        dataDecisao: new Date().toLocaleString('pt-BR')
    });

    itensEmAprovacao.splice(idx, 1);
    salvarNoNavegador(); 
    renderizarTabelas();
}
function atualizarHistorico() {
    const corpo = document.getElementById("tbodyHistorico");
    if(!corpo) return;
    corpo.innerHTML = historico.map((r, i) => 
        `<tr>
            <td>${r.data}</td>
            <td>${r.cc}</td>
            <td>${r.vence}</td>
            <td>${r.total}</td>
            <td>${r.status}</td>
            <td>
                <button onclick="gerarPDFHist(${i})" class="btn-dark" style="width:auto; padding:5px 10px">📄</button>
                <button onclick="retornarParaAprovacao(${i})" class="btn-orange" style="width:auto; padding:5px 10px; margin-left:5px">↩</button>
            </td>
        </tr>`
    ).join("");
}

function retornarParaAprovacao(idx) {
    if (!confirm("Deseja retornar este lote para a fila de aprovação?")) return;
    const h = historico[idx];
    itensEmAprovacao.push({
        id: Date.now(), 
        dataEnvio: h.data,
        centroCusto: h.cc, 
        contaContabil: h.conta,
        fornecedoresLote: h.fornecedoresOriginais || [h.vence],
        produtos: h.itens
    });
    historico.splice(idx, 1);
    salvarNoNavegador(); 
    atualizarHistorico(); 
    renderizarTabelas();
    openTab('aprovacao');
}

// --- EXPORTAÇÃO PDF ---

function gerarPDFMapaLote(idx) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF("l", "mm", "a4");
    const lote = itensEmAprovacao[idx];

    // --- CÁLCULOS DOS TOTAIS ---
    let totaisForn = Array(lote.fornecedoresLote.length).fill(0);
    lote.produtos.forEach(it => {
        it.valores.forEach((v, fIdx) => {
            totaisForn[fIdx] += (v * it.qtd);
        });
    });

    const valsValidos = totaisForn.filter(t => t > 0);
    const menor = Math.min(...valsValidos);
    const maior = Math.max(...valsValidos);
    const idxV = totaisForn.indexOf(menor);
    const econ = (maior > menor && maior > 0) ? ((maior - menor) / maior) * 100 : 0;
    const nomeVencedor = lote.fornecedoresLote[idxV] || "N/A";

    // --- CABEÇALHO VERMELHO ---
    doc.setFillColor(180, 0, 0); 
    doc.rect(0, 0, 297, 25, 'F');
    
    doc.setFontSize(18);
    doc.setTextColor(255, 255, 255);
    doc.setFont(undefined, 'bold');
    doc.text(`MAPA DE COTAÇÃO - LOTE #${idx + 1}`, 15, 16);

    // --- INFO DO LOTE ---
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(10);
    doc.text(`Centro de Custo: ${lote.centroCusto} | Conta: ${lote.contaContabil}`, 15, 32);
    doc.setFont(undefined, 'normal');
    doc.text(`Data de Envio: ${lote.dataEnvio}`, 15, 37);

    // --- TABELA PRINCIPAL ---
    const tabelaHtml = document.querySelectorAll('#tabAprovacaoWrapper table')[idx];

    doc.autoTable({
        html: tabelaHtml,
        startY: 42,
        theme: 'grid',
        styles: { fontSize: 8, cellPadding: 2, halign: 'center', font: "helvetica" }, // Força fonte padrão para evitar erro de símbolo
        headStyles: { fillColor: [180, 0, 0], textColor: [255, 255, 255], fontStyle: 'bold' },
        columnStyles: { 0: { halign: 'left', cellWidth: 'auto' } },
        didParseCell: function (data) {
            // CORREÇÃO DE CARACTERES: Limpa entidades HTML e símbolos estranhos
            if (data.cell.text && data.cell.text.length > 0) {
                data.cell.text = data.cell.text.map(t => {
                    return t.replace(/&[a-z0-9]+;/gi, '') // Remove entidades como &nbsp;
                            .replace(/[^\x00-\x7F\xC0-\xFF]/g, ""); // Remove símbolos não-latinos
                });
            }

            if (data.section === 'head' && data.cell.text[0]) {
                data.cell.text[0] = data.cell.text[0].replace(/\s*X$/, '').trim();
            }

            if (data.cell.raw && data.cell.raw.querySelector && data.cell.raw.querySelector('input')) {
                const val = data.cell.raw.querySelector('input').value;
                data.cell.text[0] = data.cell.raw.innerHTML.includes('R$') ? `R$ ${parseFloat(val).toFixed(2)}` : val;
            }

            if (data.cell.raw && data.cell.raw.classList && data.cell.raw.classList.contains('melhor')) {
                data.cell.styles.fillColor = [195, 230, 203]; 
            }
            
            // LINHA TOTAL LOTE EM VERMELHO
            if (data.section === 'foot') {
                data.cell.styles.fillColor = [180, 0, 0];
                data.cell.styles.textColor = [255, 255, 255];
                data.cell.styles.fontStyle = 'bold';
            }
        }
    });

    // --- BLOCO DO VENCEDOR ABAIXO DA TABELA ---
    let finalY = doc.lastAutoTable.finalY + 10;
    doc.setDrawColor(200, 200, 200);
    doc.line(15, finalY, 282, finalY);

    doc.setFontSize(11);
    doc.setTextColor(0, 0, 0);
    doc.setFont(undefined, 'normal');
    doc.text(`Vencedor:`, 15, finalY + 10);
    doc.setTextColor(0, 150, 0); 
    doc.setFont(undefined, 'bold');
    doc.text(nomeVencedor, 35, finalY + 10);

    doc.setTextColor(0, 0, 0);
    doc.setFont(undefined, 'normal');
    doc.text(`Valor:`, 110, finalY + 10);
    doc.setFont(undefined, 'bold');
    doc.text(`R$ ${menor.toFixed(2)}`, 125, finalY + 10);

    doc.setFont(undefined, 'normal');
    doc.text(`Economia:`, 210, finalY + 10);
    doc.setTextColor(0, 100, 255); 
    doc.setFont(undefined, 'bold');
    doc.text(`${econ.toFixed(2)}%`, 232, finalY + 10);

    doc.save(`Mapa_Lote_${idx + 1}.pdf`);
}

        ]),
        theme: 'grid',
        styles: { fontSize: 10, cellPadding: 4, font: "helvetica" },
        headStyles: { fillColor: [180, 0, 0], textColor: [255, 255, 255] }, // Cor vermelha na tabela
        columnStyles: {
            0: { cellWidth: 20, halign: 'center' },
            1: { cellWidth: 'auto' },
            2: { cellWidth: 40, halign: 'center' }
        },
        didParseCell: function (data) {
            // Limpeza de caracteres para evitar erros de acentuação na web
            if (data.cell.text && data.cell.text.length > 0) {
                data.cell.text = data.cell.text.map(t => 
                    t.replace(/&[a-z0-9]+;/gi, '').replace(/[^\x00-\x7F\xC0-\xFF]/g, "")
                );
            }
        }
    });

    // Rodapé para assinaturas
    let finalY = doc.lastAutoTable.finalY + 20;
    doc.setFontSize(9);
    doc.text("Observações: __________________________________________________________________", 14, finalY);

    doc.save(`Pedido_Lote_${idx + 1}.pdf`);
}

function gerarPDFHist(idx) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF("p", "mm", "a4");
    
    // Puxa o item do histórico
    const r = historico[idx];
    if (!r) {
        alert("Erro: Registro de histórico não encontrado.");
        return;
    }

    // --- CABEÇALHO VERMELHO ---
    doc.setFillColor(180, 0, 0); 
    doc.rect(0, 0, 210, 20, 'F');
    
    doc.setFontSize(16);
    doc.setTextColor(255, 255, 255);
    doc.setFont("helvetica", "bold");
    doc.text("ORDEM DE COMPRA", 14, 13);

    // --- INFORMAÇÕES GERAIS ---
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(10);
    doc.setFont("helvetica", "bold");
    doc.text(`Centro de Custo: ${r.cc || 'N/A'}`, 14, 28);
    // Ajustado para 'conta' que é como salvamos no decidirLote
    doc.text(`Conta Contábil: ${r.conta || 'N/A'}`, 14, 33); 
    
    doc.setTextColor(180, 0, 0);
    doc.text(`POR FAVOR INFORMAR O Nº NCM DESSE(s) ITEN(s) APROVADO(s).`, 14, 38);

    doc.setTextColor(0, 0, 0);
    doc.setFont("helvetica", "normal");
    doc.text(`Data: ${r.data}`, 110, 28);

    // --- TABELA DE ITENS ---
    doc.autoTable({ 
        startY: 45, 
        head: [['ITEM', 'PRODUTO / DESCRIÇÃO', 'QTD', 'UNITÁRIO', 'TOTAL']], 
        body: r.itens.map((it, i) => {
            // SEGURANÇA: Busca o valor usando o índice do vencedor salvo (vIdx)
            const listaValores = it.valores || [];
            const valorUnit = (typeof r.vIdx !== 'undefined' && listaValores[r.vIdx]) ? listaValores[r.vIdx] : 0;
            const valorTotal = valorUnit * (it.qtd || 0);

            return [
                i + 1,
                it.p, 
                it.qtd, 
                `R$ ${valorUnit.toFixed(2)}`, 
                `R$ ${valorTotal.toFixed(2)}`
            ];
        }),
        theme: 'grid',
        styles: { fontSize: 9, cellPadding: 3, font: "helvetica" },
        headStyles: { fillColor: [180, 0, 0], textColor: [255, 255, 255] },
        didParseCell: function (data) {
            // Limpeza de caracteres especiais para não quebrar o PDF
            if (data.cell.text && data.cell.text.length > 0) {
                data.cell.text = data.cell.text.map(t => 
                    t.replace(/&[a-z0-9]+;/gi, '').replace(/[^\x00-\x7F\xC0-\xFF]/g, "")
                );
            }
        }
    });

    // --- INFORMAÇÕES DO VENCEDOR ABAIXO DA TABELA ---
    
    let finalY = doc.lastAutoTable.finalY + 10;
    doc.setDrawColor(200, 200, 200);
    doc.line(14, finalY, 196, finalY); // Linha divisória

    doc.setFontSize(11);
    doc.setTextColor(0, 0, 0);
    doc.setFont("helvetica", "normal");
    doc.text(`Fornecedor:`, 14, finalY + 10);
    
    doc.setTextColor(0, 150, 0); 
    doc.setFont("helvetica", "bold");
    // O nome do fornecedor começa em 38 para ficar próximo ao rótulo
    doc.text(`${r.vence || 'Não identificado'}`, 38, finalY + 10);

    // TOTAL ALINHADO À DIREITA PARA NÃO SOBREPOR
    doc.setTextColor(0, 0, 0);
    doc.setFont("helvetica", "normal");
    doc.text(`Total da Ordem:`, 140, finalY + 10); // Afastado para a direita
    
    doc.setFont("helvetica", "bold");
    // Alinhamento manual: o valor fica logo após o texto "Total da Ordem"
    doc.text(`${r.total}`, 172, finalY + 10);

    // --- OBSERVAÇÕES FINAIS ---
    // --- OBSERVAÇÕES FINAIS ---
    let obsY = finalY + 25;
    doc.setFontSize(9);
    doc.setTextColor(0, 0, 0);
    doc.setFont("helvetica", "bold");
    doc.text("Observações:", 14, obsY);
    
    doc.setFont("helvetica", "normal");
    // Linha 1: Note o uso de obsY + 6
    doc.text("* Atenção! A nota fiscal SÓ PODERÁ SER EMITIDA APÓS INFORMAMOS O Nº do Pedido (POR FAVOR AGUARDE).", 14, obsY + 6);
    
    // Linha 2: Alterado para obsY + 12 para não sobrepor
    doc.text("* O Nº do Pedido precisa constar registrado na nota fiscal.", 14, obsY + 12);
    
    // Linha 3: Alterado para obsY + 18
    doc.text("* Solicitamos o envio da nota fiscal para os e-mails:", 14, obsY + 18);
    
    // Linha 4: Alterado para obsY + 24
    doc.setFont("helvetica", "bold");
    doc.setTextColor(0, 0, 255);
    doc.text("tex.nascimento@pscg.com.br e operacoes@pscg.com.br", 14, obsY + 24);

    // Salva o arquivo
    const nomeArquivo = `Ordem_Pedido_${r.numeroPedido}_${r.vence}`.replace(/\s+/g, '_');
    doc.save(`${nomeArquivo}.pdf`);
}
// --- AUXILIARES ---

function openTab(name) {
    document.querySelectorAll('.tab-content, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById(name).classList.add('active');
    const tabs = document.querySelectorAll('.tab');
    if(name === 'cotacao') tabs[0].classList.add('active');
    if(name === 'aprovacao') {
        tabs[1].classList.add('active');
        const show = itensEmAprovacao.length > 0;
        document.getElementById('lockScreen').style.display = show ? 'none' : 'block';
        document.getElementById('aprovContent').style.display = show ? 'block' : 'none';
    }
    if(name === 'historico') tabs[2].classList.add('active');
    if(name === 'config') tabs[3].classList.add('active');
    renderizarTabelas();
}

function limparCampos() { 
    document.getElementById("editIndex").value = "-1"; 
    document.getElementById("produtoSelect").value = ""; 
    document.getElementById("quantidade").value = "1"; 
    fornecedores.forEach((_, i) => { if(document.getElementById(`v${i}`)) document.getElementById(`v${i}`).value = ""; });
}

function editarItem(idx) {
    const it = itens[idx]; 
    document.getElementById("editIndex").value = idx; 
    document.getElementById("produtoSelect").value = it.p; 
    document.getElementById("quantidade").value = it.qtd;
    it.valores.forEach((v, i) => { if(document.getElementById(`v${i}`)) document.getElementById(`v${i}`).value = v; });
}
